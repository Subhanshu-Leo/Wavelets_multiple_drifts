# Hyperparameters
wavelets:
  detection_wavelet: "db4"
  ensemble_wavelet: "sym4"
  decomposition_level: 4

ensemble:
  n_init: 500              
  rf_depth: 10
  rf_n_trees: 100
  gb_depth: 5
  gb_n_trees: 100
  ridge_alpha: 1.0

detection:
  n_w: 200                 
  theta_h: 0.15            
  theta_w: 0.10            
  alpha: 0.01              
  b_perm: 1000             
  b_min: 100               
  cooldown_samples: 50     # <-- Merged perfectly

attribution:
  granger_lag: 5
  coherence_threshold: 0.70
  importance_top_k: 3
  alpha_granger: 0.05

data_quality:
  outlier_c_sigma: 2.5
  outlier_lambda: 1.4
  noise_spike_threshold: 2.0
  impute_gap_threshold: 5

retraining:
  n_buffer: 50             
  n_val: 50                
  improvement_threshold: 0.10
  weight_lr: 0.01          
  weight_reset_val: 0.5    

evaluation:
  prequential_window: 100
  test_alpha: 0.05